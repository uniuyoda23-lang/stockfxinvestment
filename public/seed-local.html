<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Seed Local Storage</title>
    <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#f8fafc}</style>
  </head>
  <body>
    <div style="text-align:center;max-width:640px;padding:24px;background:white;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.08)">
      <h2>Seeding localStorage...</h2>
      <p id="status">Setting demo users and current user, then redirecting to the app.</p>
    </div>

    <script>
      (function(){
        try {
          const users = [
            {
              id: 'local_1',
              name: 'Paul Kingsley',
              email: 'paulkingsley357@gmail.com',
              password: 'TestPass123',
              status: 'active',
              createdAt: new Date().toISOString(),
              balance: 1000,
              notifications: [],
              registrationStatus: 'confirmed',
              verified: true
            },
            {
              id: 'local_2',
              name: 'Demo User',
              email: 'demo@example.com',
              password: 'demo',
              status: 'active',
              createdAt: new Date().toISOString(),
              balance: 500,
              notifications: [],
              registrationStatus: 'confirmed',
              verified: true
            }
          ];

          localStorage.setItem('demo_users', JSON.stringify(users));
          localStorage.setItem('currentUser', JSON.stringify(users[0]));
          document.getElementById('status').textContent = '✅ demo_users and currentUser set. Redirecting...';

          setTimeout(() => {
            window.location.href = '/';
          }, 900);
        } catch (e) {
          document.getElementById('status').textContent = 'Failed to seed localStorage: ' + (e && e.message ? e.message : e);
          console.error(e);
        }
      })();
    </script>
  </body>
</html>
